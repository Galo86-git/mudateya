<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Perfil — MudateYa</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1A6FFF;--blue-lt:#EEF4FF;--blue-bd:#C7D9FF;
  --navy:#003580;--green:#16A34A;--green-lt:#F0FFF4;--green-bd:#BBF7D0;
  --text:#0F1923;--text2:#475569;--text3:#94A3B8;
  --border:#E2E8F0;--border2:#CBD5E1;--bg2:#F5F7FA;
  --mono:'DM Mono',monospace;--r:8px;--r2:12px;--r3:16px;
}
body{font-family:'Inter',sans-serif;background:#F5F7FA;color:var(--text);-webkit-font-smoothing:antialiased}
nav{background:var(--navy);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff;text-decoration:none;letter-spacing:1px}
.nav-logo span{color:#22C36A}
.nav-back{font-size:12px;color:rgba(255,255,255,.8);text-decoration:none;font-family:var(--mono);transition:color .2s;display:flex;align-items:center;gap:5px}
.nav-back:hover{color:#fff}

/* Layout */
.container{max-width:1000px;margin:0 auto;padding:2rem 1.5rem 4rem;display:grid;grid-template-columns:1fr 300px;gap:1.5rem;align-items:start}
@media(max-width:768px){.container{grid-template-columns:1fr;padding:1rem 1rem 3rem}}

/* Hero card */
.hero-card{background:#fff;border-radius:var(--r3);border:1px solid var(--border);overflow:hidden;margin-bottom:1.2rem}
.hero-cover{height:160px;background:linear-gradient(135deg,#003580 0%,#1A6FFF 100%);position:relative}
.hero-cover-pattern{position:absolute;inset:0;opacity:.08;background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='1'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E")}
.hero-avatar{position:absolute;bottom:-28px;left:1.5rem;width:72px;height:72px;border-radius:14px;background:var(--navy);border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:#fff;letter-spacing:2px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.hero-body{padding:2.2rem 1.5rem 1.5rem}
.hero-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:2px}
.hero-empresa{font-size:13px;color:var(--text2);margin-bottom:10px}
.hero-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:11px;font-family:var(--mono);font-weight:600}
.badge-green{background:var(--green-lt);color:var(--green);border:1px solid var(--green-bd)}
.badge-blue{background:var(--blue-lt);color:var(--blue);border:1px solid var(--blue-bd)}
.badge-gray{background:var(--bg2);color:var(--text2);border:1px solid var(--border2)}
.hero-zona{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px}

/* Rating destacado */
.rating-row{display:flex;align-items:center;gap:12px;padding:12px 1.5rem;border-top:1px solid var(--border);background:var(--bg2)}
.rating-num-big{background:var(--navy);color:#fff;font-size:18px;font-weight:700;padding:6px 12px;border-radius:8px;letter-spacing:.5px}
.rating-stars{display:flex;gap:2px}
.star{color:#F59E0B;font-size:16px}
.star.empty{color:#E2E8F0}
.rating-info{font-size:12px;color:var(--text2)}
.rating-info strong{color:var(--text);font-size:14px}
.rating-label{font-size:11px;color:var(--text3);font-family:var(--mono)}

/* Secciones */
.card{background:#fff;border-radius:var(--r3);border:1px solid var(--border);padding:1.4rem;margin-bottom:1.2rem}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.5px;color:var(--text);margin-bottom:1rem}
.desc-text{font-size:14px;color:var(--text2);line-height:1.75;font-weight:300}

/* Galería */
.gallery{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:160px 160px;gap:6px;border-radius:var(--r2);overflow:hidden}
.gallery-img{width:100%;height:100%;object-fit:cover;cursor:zoom-in;transition:opacity .2s}
.gallery-img:hover{opacity:.9}
.gallery-img:first-child{grid-row:1/3}
@media(max-width:600px){.gallery{grid-template-columns:1fr 1fr;grid-template-rows:120px 120px 120px}.gallery-img:first-child{grid-row:auto}}

/* Reseñas */
.resena{padding:1rem 0;border-bottom:1px solid var(--border)}
.resena:last-child{border-bottom:none}
.resena-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.resena-nombre{font-size:13px;font-weight:600;color:var(--text)}
.resena-fecha{font-size:11px;color:var(--text3);font-family:var(--mono)}
.resena-stars{display:flex;gap:2px;margin-bottom:6px}
.resena-text{font-size:13px;color:var(--text2);line-height:1.65;font-weight:300}

/* Sidebar */
.sidebar-card{background:#fff;border-radius:var(--r3);border:1px solid var(--border);padding:1.4rem;margin-bottom:1.2rem;position:sticky;top:72px}
.precio-desde{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.precio-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--blue);letter-spacing:.5px;line-height:1;margin-bottom:4px}
.precio-sub{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:1.2rem}
.btn-cot{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:var(--r2);font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;margin-bottom:8px}
.btn-cot:hover{background:#0F52CC;transform:translateY(-1px)}
.btn-sel{width:100%;padding:12px;background:#fff;color:var(--blue);border:1.5px solid var(--blue);border-radius:var(--r2);font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-sel:hover{background:var(--blue-lt)}
.divider{height:1px;background:var(--border);margin:1rem 0}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}
.info-lbl{color:var(--text3);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
.info-val{color:var(--text);font-weight:500}
.web-link{color:var(--blue);text-decoration:none;font-size:12px;font-family:var(--mono);display:flex;align-items:center;gap:4px}
.web-link:hover{text-decoration:underline}

/* Lightbox */
#lightbox{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.9);align-items:center;justify-content:center}
#lightbox.open{display:flex}
#lightbox img{max-width:90vw;max-height:90vh;border-radius:var(--r2);box-shadow:0 20px 60px rgba(0,0,0,.5)}
#lightbox-close{position:absolute;top:1.5rem;right:1.5rem;color:#fff;font-size:24px;cursor:pointer;background:rgba(255,255,255,.1);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s}
#lightbox-close:hover{background:rgba(255,255,255,.2)}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Mudate<span>Ya</span></a>
  <a href="javascript:history.back()" class="nav-back">← Volver</a>

<div class="container" id="mainContainer">
  <!-- contenido generado por JS -->
  <div style="text-align:center;padding:4rem;color:var(--text3)">
    <div style="font-size:2rem;margin-bottom:1rem">🚛</div>
    <div>Cargando perfil…</div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="cerrarLightbox()">
  <div id="lightbox-close" onclick="cerrarLightbox()">✕</div>
  <img id="lightbox-img" src="" alt=""/>
</div>

<script>
// ══════════════════════════════════════════
// DATOS EXTENDIDOS DE LOS MOCKS
// ══════════════════════════════════════════

// Fotos de trabajo (Unsplash — camiones, mudanzas, equipos)
var FOTOS_SETS = [
  [
    'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=80',
    'https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=600&q=80',

    'https://images.unsplash.com/photo-1615873968403-89e068629265?w=600&q=80',
    'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=600&q=80',
    'https://images.unsplash.com/photo-1600585154526-990dced4db0d?w=600&q=80',
  ],
  [
    'https://images.unsplash.com/photo-1595435934249-5df7ed86e1c0?w=800&q=80',
    'https://images.unsplash.com/photo-1600047509358-9dc75507daeb?w=600&q=80',
    'https://images.unsplash.com/photo-1556909172-54557c7e4fb7?w=600&q=80',

    'https://images.unsplash.com/photo-1600047509807-ba8f99d2cdde?w=600&q=80',
    'https://images.unsplash.com/photo-1595435934249-5df7ed86e1c0?w=600&q=80',
    'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=600&q=80',
  ],
];

var DESCRIPCIONES = [
  'Somos una empresa familiar con más de 15 años en el mercado de mudanzas en Buenos Aires. Trabajamos con camiones propios, personal capacitado y cobertura en toda la ciudad y el conurbano. Cada mudanza es tratada con el mismo cuidado que si fuera la nuestra.',
  'Especialistas en mudanzas residenciales y comerciales. Contamos con flota de vehículos modernos, equipados con mantas protectoras, sogas y carros. Nuestro equipo trabaja con puntualidad y respeto por tus pertenencias.',
  'Empresa de transporte y mudanzas con cobertura nacional. Más de 10 años de experiencia, más de 500 clientes satisfechos. Ofrecemos servicio completo: embalaje, carga, transporte y descarga. Presupuesto sin cargo.',
  'Nos especializamos en mudanzas de departamentos y casas en CABA y GBA. Personal propio, camión con hidrogrúa disponible para objetos de gran porte. Trabajamos de lunes a sábado en horario extendido.',
  'Empresa de fletes y mudanzas con más de 8 años en el rubro. Cubrimos CABA, Gran Buenos Aires y larga distancia. Equipo profesional, puntual y cuidadoso. Solicitá tu presupuesto hoy.',
  'Transportes especializados en mudanzas residenciales, comerciales y de oficinas. Contamos con seguro de carga incluido en todos nuestros servicios. Trabajamos con materiales de embalaje profesional.',
  'Más de 20 años movilizando hogares en Argentina. Equipo con experiencia en todo tipo de inmuebles, desde monoambientes hasta casas grandes. Servicio personalizado, precios claros y sin sorpresas.',
  'Empresa de transporte de cargas y mudanzas con base en CABA. Flota propia, GPS en todos los vehículos, seguimiento en tiempo real. Atención personalizada de lunes a domingo.',
];

var RESEÑAS_POOL = [
  {autor:'Mariana G.', texto:'Excelente servicio, llegaron puntual y fueron muy cuidadosos con todos mis muebles. Muy recomendables.', estrellas:5, fecha:'Enero 2026'},
  {autor:'Sebastián P.', texto:'Muy buena experiencia. Rápidos, organizados y el precio fue justo. La segunda vez que los contrato.', estrellas:5, fecha:'Diciembre 2025'},
  {autor:'Laura M.', texto:'Professionales y amables. Embalaron todo perfectamente y no se rompió nada.', estrellas:5, fecha:'Noviembre 2025'},
  {autor:'Tomás V.', texto:'Llegaron en hora y terminaron antes de lo estimado. Precio muy razonable.', estrellas:4, fecha:'Octubre 2025'},
  {autor:'Carla R.', texto:'Muy buen servicio. El camión era grande y entró todo en un solo viaje. Los recomiendo.', estrellas:5, fecha:'Septiembre 2025'},
  {autor:'Federico A.', texto:'Buena atención desde el primer contacto. Mudanza sin inconvenientes.', estrellas:4, fecha:'Agosto 2025'},
  {autor:'Natalia S.', texto:'Super prolijos y cuidadosos. Hasta me ayudaron a acomodar los muebles en el nuevo lugar.', estrellas:5, fecha:'Julio 2025'},
  {autor:'Gonzalo B.', texto:'Servicio de primera. Puntualidad, buen trato y precio competitivo.', estrellas:5, fecha:'Junio 2025'},
  {autor:'Valeria C.', texto:'Los recomiendo ampliamente. Hicieron todo en tiempo récord y sin daños.', estrellas:5, fecha:'Mayo 2025'},
  {autor:'Martín H.', texto:'Segunda vez que los uso y siempre a la altura. Confiables y eficientes.', estrellas:5, fecha:'Abril 2025'},
];

var SITIOS = [
  'www.mudanzasgomez.com.ar',
  'www.silvafletes.com.ar',
  'www.mudanzasba.com.ar',
  'www.transmudbaires.com',
  'www.fletesrapidos.com.ar',
  'www.perez-mudanzas.com.ar',
  'www.transmud.com.ar',
  'www.castrohijos.com.ar',
  'www.molimud.com.ar',
  'www.ortiz-transportes.com.ar',
];

var AÑOS_EXP = [8,12,15,6,20,10,5,18,9,14,7,11,16,13,4,22,3,17,8,12];

// Función para obtener datos extendidos por índice
function getDatosExtra(idx) {
  var set = idx % FOTOS_SETS.length;
  var desc = idx % DESCRIPCIONES.length;
  var sitio = idx % SITIOS.length;
  var años = AÑOS_EXP[idx % AÑOS_EXP.length];
  // 4 reseñas por perfil, rotando
  var resenas = [];
  for (var i = 0; i < 4; i++) {
    resenas.push(RESEÑAS_POOL[(idx * 4 + i) % RESEÑAS_POOL.length]);
  }
  return {
    fotos: FOTOS_SETS[set],
    descripcion: DESCRIPCIONES[desc],
    sitioWeb: SITIOS[sitio],
    añosExp: años,
    resenas: resenas,
  };
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function renderPerfil(m, extra) {
  var initials = (m.nombre||'MV').split(' ').map(function(p){return p[0];}).join('').slice(0,2).toUpperCase();
  var precio = m.precios ? (m.precios.amb1 || 0) : 0;
  var ratingLabel = m.calificacion >= 4.8 ? 'Excepcional' : m.calificacion >= 4.5 ? 'Muy bueno' : m.calificacion >= 4 ? 'Bueno' : 'Bien';
  var starsHtml = '';
  for (var i = 1; i <= 5; i++) {
    starsHtml += '<span class="star'+(i > Math.round(m.calificacion)?' empty':'')+'">★</span>';
  }

  // Badges
  var badges = '';
  if (m.verificadoIdentidad) badges += '<span class="badge badge-green">✓ Identidad verificada</span>';
  if (m.verificadoVehiculo)  badges += '<span class="badge badge-blue">🚛 Vehículo verificado</span>';
  if (m.verificadoSeguro)    badges += '<span class="badge badge-green">🛡 Con seguro</span>';
  badges += '<span class="badge badge-gray">📍 '+m.zonaBase+'</span>';
  badges += '<span class="badge badge-gray">'+m.vehiculo+'</span>';

  // Galería
  var galeriaHtml = '<div class="gallery">';
  extra.fotos.slice(0,5).forEach(function(url, i) {
    galeriaHtml += '<img class="gallery-img" src="'+url+'" alt="Foto '+(i+1)+'" onclick="abrirLightbox(\''+url+'\')" '+(i===0?'':'')+'loading="lazy"/>';
  });
  galeriaHtml += '</div>';

  // Reseñas
  var resenasHtml = extra.resenas.map(function(r) {
    var rs = '';
    for (var i = 1; i <= 5; i++) rs += '<span style="color:'+(i<=r.estrellas?'#F59E0B':'#E2E8F0');rs+=';font-size:13px">★</span>';
    return '<div class="resena">'
      +'<div class="resena-header"><span class="resena-nombre">'+r.autor+'</span><span class="resena-fecha">'+r.fecha+'</span></div>'
      +'<div class="resena-stars">'+rs+'</div>'
      +'<div class="resena-text">'+r.texto+'</div>'
      +'</div>';
  }).join('');

  document.title = (m.empresa || m.nombre) + ' — MudateYa';

  document.getElementById('mainContainer').innerHTML =
    // Columna principal
    '<div>'
    // Hero
    +'<div class="hero-card">'
    +'<div class="hero-cover"><div class="hero-cover-pattern"></div>'
    +'<div class="hero-avatar">'+initials+'</div></div>'
    +'<div class="hero-body">'
    +'<div class="hero-name">'+(m.empresa||m.nombre)+'</div>'
    +'<div class="hero-empresa">'+(m.empresa ? 'Propietario: '+m.nombre : 'Prestador independiente')+'</div>'
    +'<div class="hero-badges">'+badges+'</div>'
    +'</div>'
    +'<div class="rating-row">'
    +'<div class="rating-num-big">'+m.calificacion.toFixed(1)+'</div>'
    +'<div><div class="rating-stars">'+starsHtml+'</div>'
    +'<div class="rating-label">'+ratingLabel+' · '+m.nroResenas+' reseñas · '+m.trabajosCompletados+' mudanzas</div>'
    +'</div></div>'
    +'</div>'

    // Descripción
    +'<div class="card">'
    +'<div class="card-title">Sobre nosotros</div>'
    +'<p class="desc-text">'+extra.descripcion+'</p>'
    +'</div>'

    // Galería
    +'<div class="card">'
    +'<div class="card-title">Fotos del servicio</div>'
    +galeriaHtml
    +'</div>'

    // Reseñas
    +'<div class="card">'
    +'<div class="card-title">Reseñas de clientes</div>'
    +resenasHtml
    +'</div>'
    +'</div>'

    // Sidebar
    +'<div>'
    +'<div class="sidebar-card">'
    +'<div class="precio-desde">Precio desde</div>'
    +'<div class="precio-num">$'+precio.toLocaleString('es-AR')+'</div>'
    +'<div class="precio-sub">por ambiente · precio estimado</div>'
    +'<button class="btn-cot" onclick="solicitarCotizacion()">Solicitar cotización →</button>'
    +'<button class="btn-sel" onclick="seleccionarYVolver()">+ Seleccionar mudancero</button>'
    +'<div class="divider"></div>'
    +'<div class="info-row"><span class="info-lbl">Experiencia</span><span class="info-val">'+extra.añosExp+' años</span></div>'
    +'<div class="info-row"><span class="info-lbl">Zona principal</span><span class="info-val">'+m.zonaBase+'</span></div>'
    +'<div class="info-row"><span class="info-lbl">Vehículo</span><span class="info-val">'+m.vehiculo+'</span></div>'
    +'<div class="info-row"><span class="info-lbl">Trabajos</span><span class="info-val">'+m.trabajosCompletados+' completados</span></div>'
    +'<div class="divider"></div>'
    +'<a href="https://'+extra.sitioWeb+'" target="_blank" class="web-link">🌐 '+extra.sitioWeb+'</a>'
    +'</div>'
    +'</div>';
}

function abrirLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('open');
}
function cerrarLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', function(e){ if(e.key==='Escape') cerrarLightbox(); });

function solicitarCotizacion() {
  window.location.href = '/#resultados';
}
function seleccionarYVolver() {
  // Marcar como seleccionado y volver
  var email = new URLSearchParams(location.search).get('id');
  if (email) {
    try {
      var sel = JSON.parse(sessionStorage.getItem('seleccionados')||'[]');
      if (!sel.includes(email)) sel.push(email);
      sessionStorage.setItem('seleccionados', JSON.stringify(sel));
    } catch(e){}
  }
  history.back();
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
(function init() {
  // Intentar leer del sessionStorage primero (más rápido)
  var m = null;
  try { m = JSON.parse(sessionStorage.getItem('perfilMudancero')); } catch(e){}

  if (!m) {
    document.getElementById('mainContainer').innerHTML =
      '<div style="text-align:center;padding:4rem;color:var(--text3)">'
      +'<div style="font-size:3rem;margin-bottom:1rem">😕</div>'
      +'<div style="font-size:16px;font-weight:600;margin-bottom:8px">Perfil no encontrado</div>'
      +'<p style="font-size:13px;margin-bottom:1.5rem">No pudimos cargar los datos de este mudancero.</p>'
      +'<a href="/" style="color:var(--blue);font-size:13px">← Volver al inicio</a>'
      +'</div>';
    return;
  }

  // Calcular índice basado en el email para datos extra consistentes
  var email = m.email || '';
  var idx = 0;
  for (var i = 0; i < email.length; i++) idx += email.charCodeAt(i);
  idx = idx % 50;

  var extra = getDatosExtra(idx);
  renderPerfil(m, extra);
})();
</script>
</body>
</html>
